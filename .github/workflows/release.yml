name: release

# Gera os artefatos de release do RemoteOps Desktop ao empurrar uma tag `vX.Y.Z[-alpha|-beta|-rc.N]`
# (SemVer interno, docs/23-governanca-versionamento-changelog.md / VERSIONING.md).
#
# Empacotamento via Velopack (`vpk`) — config do projeto (Velopack.Packaging no .csproj,
# ícone, VelopackApp.Build().Run() no Main) vem de ADR-019. Publish usa o profile canônico
# `win-x64-velopack.pubxml` (self-contained, PublishReadyToRun, IncludeNativeLibrariesForSelfExtract)
# para não divergir do que é documentado/validado em docs/26-empacotamento-atualizacao-velopack.md.
#
# `vpk upload github` publica o Release **e** o feed de auto-update (RELEASES/releases.win.json +
# *.nupkg full/delta) consumido em runtime por `GithubSource`/`UpdateManager`
# (`AppCompositionRoot.RegisterUpdateService`) — ver ADR-019 §4. Um `gh release create` manual
# não gera esses artefatos de feed, então este workflow usa exclusivamente `vpk upload github`
# como fonte de verdade da publicação.
#
# Sem segredos: usa apenas o GITHUB_TOKEN padrão. Assinatura de binário (SignTool/certificado)
# fica fora de escopo (docs/11 §Secret management no CI) e deve ser um workflow/step separado
# quando houver certificado disponível via GitHub Environments com approval.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  APP_PROJECT: src/RemoteOps.Desktop/RemoteOps.Desktop.csproj
  APP_ICON: src/RemoteOps.Desktop/assets/appicon.ico
  APP_ID: RemoteOpsDesktop
  APP_EXE: RemoteOps.Desktop.exe
  RUNTIME_ID: win-x64
  PUBLISH_DIR: publish/win-x64
  RELEASE_DIR: Releases
  # Feed de auto-update: os clientes leem o repo PÚBLICO anonimamente (o código-fonte fica no repo
  # privado). Publicar direto no público exige um token com escrita nele (secrets.RELEASES_REPO_TOKEN,
  # um PAT fine-grained). Sem esse secret, cai no repo privado (comportamento antigo) para não quebrar
  # o release — o feed público é então preenchido pelo espelhamento manual (tools/mirror-release.sh).
  PUBLIC_REPO_URL: https://github.com/vagnerss2011-spec/InnetTermb-releases
  PRIVATE_REPO_URL: https://github.com/vagnerss2011-spec/InnetTermb

jobs:
  build-and-release:
    name: Build, empacotar (Velopack) e publicar release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derivar e validar versão da tag (SemVer interno — docs/23)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$') {
            Write-Error "Tag '$tag' nao segue o SemVer interno esperado (vX.Y.Z ou vX.Y.Z-alpha|beta|rc.N). Ver VERSIONING.md."
            exit 1
          }
          $isPrerelease = $version -match '-(alpha|beta|rc)\.'
          Write-Host "Versao: $version (prerelease: $isPrerelease)"
          "VERSION=$version" >> $env:GITHUB_ENV
          "IS_PRERELEASE=$isPrerelease" >> $env:GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore

      - name: Instalar Velopack CLI (vpk)
        shell: pwsh
        run: dotnet tool install -g vpk

      - name: Publish self-contained (profile win-x64-velopack — ADR-019/docs/26)
        shell: pwsh
        run: |
          dotnet publish "${{ env.APP_PROJECT }}" `
            -c Release `
            -p:PublishProfile=win-x64-velopack `
            -p:Version=${{ env.VERSION }} `
            -o "${{ env.PUBLISH_DIR }}"

      - name: Empacotar com Velopack (vpk pack)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.RELEASE_DIR }}" | Out-Null
          vpk pack `
            --packId "${{ env.APP_ID }}" `
            --packVersion "${{ env.VERSION }}" `
            --packDir "${{ env.PUBLISH_DIR }}" `
            --mainExe "${{ env.APP_EXE }}" `
            --packTitle "RemoteOps Desktop" `
            --packAuthors "InnetTermb" `
            --icon "${{ env.APP_ICON }}" `
            --outputDir "${{ env.RELEASE_DIR }}"

      - name: Gerar manifest de build e hashes SHA-256 (docs/23)
        shell: pwsh
        run: |
          $manifestPath = Join-Path "${{ env.RELEASE_DIR }}" "build-manifest.json"
          $shaPath = Join-Path "${{ env.RELEASE_DIR }}" "SHA256SUMS.txt"

          $files = Get-ChildItem -Path "${{ env.RELEASE_DIR }}" -File | Where-Object {
            $_.Name -ne "build-manifest.json" -and $_.Name -ne "SHA256SUMS.txt"
          }

          $hashLines = foreach ($f in $files) {
            $hash = (Get-FileHash -Path $f.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($f.Name)"
          }
          $hashLines | Set-Content -Path $shaPath -Encoding utf8

          $manifest = [ordered]@{
            component     = "${{ env.APP_ID }}"
            version       = "${{ env.VERSION }}"
            commit        = "${{ github.sha }}"
            branch        = "${{ github.ref_name }}"
            builtAtUtc    = (Get-Date).ToUniversalTime().ToString("o")
            dotnetVersion = "${{ env.DOTNET_VERSION }}"
            runtime       = "${{ env.RUNTIME_ID }}"
            artifacts     = @($files.Name)
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path $manifestPath -Encoding utf8

      - name: Upload artefatos do workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_ID }}-${{ env.VERSION }}
          path: ${{ env.RELEASE_DIR }}/*
          if-no-files-found: error
          # Estes arquivos JÁ são publicados como assets do Release (grátis/ilimitado). O artefato de
          # workflow é só um fallback de debug e CONTA no cofre de armazenamento (o de 90 dias padrão
          # × 260MB/run encheu ~7GB). 3 dias basta pra recuperar um build recém-quebrado.
          retention-days: 3

      - name: vpk upload github (publica o Release + feed de auto-update)
        shell: pwsh
        env:
          GH_TOKEN_DEFAULT: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN_RELEASES: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          # Prefere o repo PÚBLICO de releases quando há token de escrita para ele; senão publica no
          # privado (o GITHUB_TOKEN só tem escrita no próprio repo) e o feed público é espelhado à mão.
          if ($env:GH_TOKEN_RELEASES) {
            $repoUrl = "${{ env.PUBLIC_REPO_URL }}"; $token = $env:GH_TOKEN_RELEASES
            Write-Host "Publicando no feed PÚBLICO ($repoUrl) — auto-update anônimo."
          } else {
            $repoUrl = "${{ env.PRIVATE_REPO_URL }}"; $token = $env:GH_TOKEN_DEFAULT
            Write-Host "RELEASES_REPO_TOKEN ausente — publicando no repo PRIVADO ($repoUrl). Espelhe o feed público com tools/mirror-release.sh."
          }
          $vpkArgs = @(
            "upload", "github",
            "--repoUrl", "$repoUrl",
            "--token", "$token",
            "--tag", "${{ github.ref_name }}",
            "--releaseName", "RemoteOps Desktop ${{ env.VERSION }}",
            "--outputDir", "${{ env.RELEASE_DIR }}",
            "--publish"
          )
          if ($env:IS_PRERELEASE -eq "True") { $vpkArgs += "--pre" }
          & vpk @vpkArgs

      - name: Podar releases/artefatos antigos (manter no máximo 3)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          CURRENT="${{ github.ref_name }}"   # vX.Y.Z desta release

          # RELEASES: ordena por SEMVER numérico (robusto — NÃO por data, que o mirror embaralha),
          # mantém as 3 maiores versões e apaga o resto. Guarda dupla: nunca apaga a versão ATUAL.
          to_del=$(gh release list --repo "$REPO" --json tagName \
            --jq '[.[].tagName | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))]
                  | sort_by(.[1:] | split(".") | map(tonumber)) | reverse | .[3:] | .[]' || true)
          for t in $to_del; do
            if [ "$t" = "$CURRENT" ]; then echo "guarda: pulando release atual $t"; continue; fi
            echo "apagando release antiga $t (+tag)"
            gh release delete "$t" --repo "$REPO" --cleanup-tag --yes || true
          done

          # ARTEFATOS de workflow (contam no armazenamento): mantém os 3 mais novos, apaga o resto.
          # created_at é confiável aqui (artefato é criado 1x por run, nunca atualizado).
          del_art=$(gh api "repos/$REPO/actions/artifacts" --paginate \
            --jq '.artifacts | sort_by(.created_at) | reverse | .[3:] | .[].id' || true)
          for id in $del_art; do
            echo "apagando artefato $id"
            gh api -X DELETE "repos/$REPO/actions/artifacts/$id" || true
          done
