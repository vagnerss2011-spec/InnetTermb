# Postgres local para desenvolvimento do NDesk Broker (docs/27-executar-broker-local.md).
# Uso: docker compose -f deploy/docker-compose.dev.yml up -d
# NÃO usar em produção — senha de dev, sem TLS, volume efêmero.
services:
  ndesk-postgres:
    image: postgres:16-alpine
    container_name: ndesk-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: ndesk
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ndesk"]
      interval: 5s
      timeout: 3s
      retries: 10
